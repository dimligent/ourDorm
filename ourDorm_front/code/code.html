<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#30abe8",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111c21",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Dormitory Hub - Home</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex min-h-screen flex-col">
<!-- Top Navigation -->
<header class="sticky top-0 z-50 w-full border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex h-16 items-center justify-between">
<div class="flex items-center gap-8">
<div class="flex items-center gap-2">
<div class="size-8 bg-primary rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined">apartment</span>
</div>
<span class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">DormHub</span>
</div>
<nav class="hidden md:flex items-center gap-6">
<a class="text-sm font-semibold text-primary" href="#">Home</a>
</nav>
</div>
<div class="flex items-center gap-3">
<button class="flex items-center justify-center rounded-lg h-10 px-4 bg-primary text-white text-sm font-bold transition-all hover:bg-primary/90">
<span>Register/Login</span>
</button>
<button class="flex items-center justify-center rounded-lg h-10 px-4 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 text-sm font-bold transition-all hover:bg-slate-200 dark:hover:bg-slate-700">
<span>About the Author</span>
</button>
</div>
</div>
</div>
</header>
<!-- Main Body -->
<main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">
<div class="flex flex-col lg:flex-row gap-8">
<!-- Left Section: Dormitory Members (70%) -->
<section class="w-full lg:w-[70%]">
<div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 p-8 min-h-[500px] flex flex-col">
<div class="mb-8">
<h2 class="text-2xl font-bold text-slate-900 dark:text-white">Dormitory Residents</h2>
<p class="text-slate-500 dark:text-slate-400 mt-1">Select a member to view their profile and activity.</p>
</div>
<div class="flex-1 flex items-center justify-center">
<div class="grid grid-cols-1 sm:grid-cols-2 gap-6 w-full max-w-2xl">
<!-- Member 1 -->
<button class="group relative flex flex-col items-center justify-center p-8 rounded-xl bg-primary/5 hover:bg-primary/10 border-2 border-dashed border-primary/20 hover:border-primary transition-all">
<div class="size-16 rounded-full bg-primary/20 flex items-center justify-center mb-4 text-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl">person</span>
</div>
<span class="text-lg font-bold text-slate-800 dark:text-slate-100">Alex Rivers</span>
<span class="text-xs uppercase tracking-widest text-primary font-semibold mt-1">Room 302A</span>
</button>
<!-- Member 2 -->
<button class="group relative flex flex-col items-center justify-center p-8 rounded-xl bg-primary/5 hover:bg-primary/10 border-2 border-dashed border-primary/20 hover:border-primary transition-all">
<div class="size-16 rounded-full bg-primary/20 flex items-center justify-center mb-4 text-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl">person_4</span>
</div>
<span class="text-lg font-bold text-slate-800 dark:text-slate-100">Jordan Smith</span>
<span class="text-xs uppercase tracking-widest text-primary font-semibold mt-1">Room 302B</span>
</button>
<!-- Member 3 -->
<button class="group relative flex flex-col items-center justify-center p-8 rounded-xl bg-primary/5 hover:bg-primary/10 border-2 border-dashed border-primary/20 hover:border-primary transition-all">
<div class="size-16 rounded-full bg-primary/20 flex items-center justify-center mb-4 text-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl">person_3</span>
</div>
<span class="text-lg font-bold text-slate-800 dark:text-slate-100">Casey Chen</span>
<span class="text-xs uppercase tracking-widest text-primary font-semibold mt-1">Room 302C</span>
</button>
<!-- Member 4 -->
<button class="group relative flex flex-col items-center justify-center p-8 rounded-xl bg-primary/5 hover:bg-primary/10 border-2 border-dashed border-primary/20 hover:border-primary transition-all">
<div class="size-16 rounded-full bg-primary/20 flex items-center justify-center mb-4 text-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl">person_2</span>
</div>
<span class="text-lg font-bold text-slate-800 dark:text-slate-100">Riley Taylor</span>
<span class="text-xs uppercase tracking-widest text-primary font-semibold mt-1">Room 302D</span>
</button>
</div>
</div>
</div>
</section>
<!-- Right Section: Tools (30%) -->
<aside class="w-full lg:w-[30%] flex flex-col gap-4">
<div class="p-4 bg-slate-100/50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-800">
<h3 class="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-4 px-2">Quick Access Tools</h3>
<div class="flex flex-col gap-4">
<!-- Flag Tracker -->
<button class="group flex items-center gap-4 p-4 w-full bg-white dark:bg-slate-900 hover:bg-primary hover:text-white transition-all rounded-xl shadow-sm border border-slate-200 dark:border-slate-800">
<div class="size-12 rounded-full bg-primary/10 group-hover:bg-white/20 flex items-center justify-center text-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined">flag</span>
</div>
<div class="text-left">
<p class="font-bold text-base">Flag Tracker</p>
<p class="text-xs text-slate-500 dark:text-slate-400 group-hover:text-white/80">Manage penalty points</p>
</div>
</button>
<!-- Countdown Day -->
<button class="group flex items-center gap-4 p-4 w-full bg-white dark:bg-slate-900 hover:bg-primary hover:text-white transition-all rounded-xl shadow-sm border border-slate-200 dark:border-slate-800">
<div class="size-12 rounded-full bg-primary/10 group-hover:bg-white/20 flex items-center justify-center text-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined">event</span>
</div>
<div class="text-left">
<p class="font-bold text-base">Countdown Day</p>
<p class="text-xs text-slate-500 dark:text-slate-400 group-hover:text-white/80">Upcoming events</p>
</div>
</button>
<!-- Dormitory Log -->
<button class="group flex items-center gap-4 p-4 w-full bg-white dark:bg-slate-900 hover:bg-primary hover:text-white transition-all rounded-xl shadow-sm border border-slate-200 dark:border-slate-800">
<div class="size-12 rounded-full bg-primary/10 group-hover:bg-white/20 flex items-center justify-center text-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined">history_edu</span>
</div>
<div class="text-left">
<p class="font-bold text-base">Dormitory Log</p>
<p class="text-xs text-slate-500 dark:text-slate-400 group-hover:text-white/80">Daily activity records</p>
</div>
</button>
</div>
</div>
<!-- Small Info Card -->
<div class="relative overflow-hidden p-6 rounded-xl bg-primary text-white">
<div class="relative z-10">
<h4 class="font-bold mb-2">Notice Board</h4>
<p class="text-sm text-white/90">General cleaning is scheduled for this Sunday at 10:00 AM. Please ensure all common areas are tidy.</p>
</div>
<div class="absolute -right-4 -bottom-4 opacity-10">
<span class="material-symbols-outlined text-[100px]">notifications</span>
</div>
</div>
</aside>
</div>
</main>
<!-- Footer (Optional but good for layout consistency) -->
<footer class="w-full border-t border-slate-200 dark:border-slate-800 py-6 mt-auto">
<div class="max-w-7xl mx-auto px-4 text-center text-slate-500 dark:text-slate-400 text-sm">
                © 2024 Dormitory Hub. All rights reserved.
            </div>
</footer>
</div>
</body></html>
