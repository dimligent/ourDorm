name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: read-all

jobs:
  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ourDorm_front/package-lock.json

      - name: Install
        run: npm ci
        working-directory: ourDorm_front

      - name: Build
        run: npm run build
        working-directory: ourDorm_front

  backend:
    name: Backend (typegen)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ourDorm_back/package-lock.json

      - name: Install
        run: npm ci
        working-directory: ourDorm_back

      - name: Wrangler typegen
        run: npm run cf-typegen
        working-directory: ourDorm_back

